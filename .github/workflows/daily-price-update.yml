name: Daily Price Updater

on:
  schedule:
    - cron: '0 5 * * *' # Runs at 05:00 UTC (Midnight EST) daily
  workflow_dispatch: # Allows manual trigger from GitHub UI

jobs:
  scrape-and-update:
    runs-on: ubuntu-latest
    
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Dependencies
        run: |
          npm ci
          npx playwright install --with-deps chromium

      - name: Run Price Scraper
        run: node scripts/update_prices.cjs

      - name: Commit and Push Changes
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add public/data/driver-lineups.json
          # Only commit if the file has changed
          git diff --quiet && git diff --staged --quiet || (git commit -m "chore: automated daily price update" && git push)
